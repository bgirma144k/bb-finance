<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B&B Finance — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #f7f5f2; --navy-mid: #ffffff; --navy-card: #ffffff; --border: rgba(160, 130, 60, 0.15);
      --border-hover: rgba(160, 130, 60, 0.35); --gold: #a07830; --gold-light: #c9a84c;
      --gold-dim: rgba(201, 168, 76, 0.1); --cream: #1a1510; --cream-dim: rgba(26, 21, 16, 0.65);
      --cream-faint: rgba(26, 21, 16, 0.38); --green: #16a34a; --red: #dc2626; --sidebar-w: 240px;
    }
    body { background: var(--navy); color: var(--cream); font-family: 'DM Sans', sans-serif; display: flex; min-height: 100vh; }
    .sidebar { width: var(--sidebar-w); background: var(--navy-mid); border-right: 1px solid var(--border); position: fixed; height: 100vh; display: flex; flex-direction: column; }
    .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
    .content { padding: 28px 32px; }
    .view { display: none; }
    .view.active { display: block; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--navy-card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    .panel { background: var(--navy-card); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 20px; }
    .panel-head { padding: 18px 22px; border-bottom: 1px solid var(--border); font-family: 'Cormorant Garamond', serif; font-size: 17px; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { font-size: 9px; text-transform: uppercase; color: var(--cream-faint); padding: 10px 22px; text-align: left; }
    .data-table td { padding: 13px 22px; font-size: 13px; color: var(--cream-dim); border-bottom: 1px solid rgba(160,130,60,0.08); }
    .income-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .income-card { background: var(--navy-card); border: 1px solid var(--border); border-radius: 14px; padding: 22px; }
    .income-amount { font-family: 'Cormorant Garamond', serif; font-size: 32px; color: var(--green); }
    .credit-card { border-radius: 12px; padding: 18px; background: #faf8f5; border: 1px solid var(--border); margin-bottom: 10px; }
  </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><div class="logo-badge">B&B</div></div>
  <nav class="sidebar-nav">
    <div class="nav-item active" onclick="switchView('dashboard', this)">Dashboard</div>
    <div class="nav-item" onclick="switchView('income', this)">Income</div>
  </nav>
</aside>

<div class="main">
  <header class="topbar" style="padding: 20px 32px; border-bottom: 1px solid var(--border);">
    <button onclick="connectPlaid()">Connect Bank</button>
  </header>

  <div class="content">
    <div class="view active" id="view-dashboard">
      <div class="stats-row" id="statsRow">
         <div class="stat-card"><div class="stat-label">Monthly Income</div><div class="stat-value green" id="statIncome">$0</div></div>
         <div class="stat-card"><div class="stat-label">Monthly Expenses</div><div class="stat-value red" id="statExpenses">$0</div></div>
      </div>
      <div id="cardsGrid" class="cards-grid"></div>
    </div>
    
    <div class="view" id="view-income">
      <div class="income-row" id="incomeCards"></div>
    </div>
  </div>
</div>

<script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
<script>
let budgetData = {
    monthlyExpenses: [],
    yearlyExpenses: [],
    income: [],
    cards: [
      { name: 'AMEX Platinum (···1006)', balance: 0, useCase: 'Airfare, hotels' },
      { name: 'AMEX Gold (···1005)', balance: 0, useCase: 'Eating out' }
    ]
};
let plaidAccounts = [];
let allTransactions = [];

// Initialize
document.addEventListener('DOMContentLoaded', async () => {
    // Mock data load
    budgetData.monthlyExpenses = [{ category: 'Rent', amount: 1600, dueDate: '1st', type: 'Bank' }];
    await loadPlaidData();
});

/** * FETCH DATA FROM API
 */
async function loadPlaidData() {
    try {
        // Replace these with your actual endpoints
        const [balRes, txnRes] = await Promise.all([
            fetch('/api/plaid/balances'),
            fetch('/api/plaid/transactions')
        ]);
        const balData = await balRes.json();
        const txnData = await txnRes.json();
        
        plaidAccounts = balData.accounts || [];
        allTransactions = txnData.transactions || [];
        
        renderAll();
    } catch (e) { console.error('Data Load Error', e); }
}

/** * RENDER LOGIC
 */
function renderAll() {
    renderCards();
    renderIncome();
    renderStats();
}

// Logic: Only show value if account is linked via Plaid
function renderCards() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  budgetData.cards.forEach(c => {
    const linked = plaidAccounts.find(pa => c.name.includes(pa.mask));
    const div = document.createElement('div');
    div.className = 'credit-card';
    div.innerHTML = `
      <div class="cc-name">${c.name}</div>
      <div class="cc-balance">${linked ? fmt(linked.balance) : '—'}</div>
      <div class="cc-use">${c.useCase}</div>
      <div style="font-size:10px; color:${linked ? 'green' : 'red'}">${linked ? 'Linked' : 'Not Connected'}</div>
    `;
    grid.appendChild(div);
  });
}

// Logic: GM for Brad, All other deposits for Beza
function renderIncome() {
  const container = document.getElementById('incomeCards');
  container.innerHTML = '';
  let brad = 0, beza = 0;

  allTransactions.forEach(t => {
    if (t.amount < 0) { // Plaid deposits are negative
      const name = t.name.toLowerCase();
      if (name.includes('gm') || name.includes('general motors')) {
        brad += Math.abs(t.amount);
      } else {
        beza += Math.abs(t.amount);
      }
    }
  });

  container.innerHTML = `
    <div class="income-card"><h3>Brad (GM)</h3><div class="income-amount">${fmt(brad)}</div></div>
    <div class="income-card"><h3>Beza (Other)</h3><div class="income-amount">${fmt(beza)}</div></div>
  `;
}

function fmt(n) { return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n); }

function switchView(id, el) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + id).classList.add('active');
}
</script>
</body>
</html>
